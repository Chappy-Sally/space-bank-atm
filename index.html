<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>宇宙銀行ATM｜チャッピー＆サリー</title>
  <style>
    :root{
      --bg1:#050712;
      --bg2:#0a1030;
      --card:#0d1326cc;
      --card2:#0f1730cc;
      --line:#ffffff1a;
      --text:#eef2ff;
      --muted:#b7c0ffcc;
      --gold:#f7d77a;
      --ok:#2f8f7a;
      --danger:#7c3c4b;
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --radius: 26px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 0%, #1a1f44 0%, transparent 55%),
        radial-gradient(1000px 700px at 80% 20%, #2a164c 0%, transparent 60%),
        radial-gradient(900px 700px at 40% 100%, #0b2b45 0%, transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:18px 14px 40px;
    }

    .app{
      width:min(430px, 100%);
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 14px;
      background: linear-gradient(180deg, #101833cc, #0a0f22cc);
      border:1px solid var(--line);
      border-radius:999px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background: radial-gradient(circle at 35% 35%, #fff 0%, var(--gold) 35%, #b98b2a 100%);
      box-shadow: 0 0 18px rgba(247,215,122,.6);
      flex:0 0 auto;
    }

    .brandtext{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      min-width:0;
    }

    .brandtext b{
      font-size:15px;
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brandtext span{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .pill{
      border:1px solid var(--line);
      background: linear-gradient(180deg, #182048cc, #0f1633cc);
      color:var(--text);
      padding:10px 12px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
      user-select:none;
      white-space:nowrap;
    }

    .pill.gold{
      border-color: rgba(247,215,122,.35);
      box-shadow: 0 10px 35px rgba(247,215,122,.15);
    }

    .card{
      background: linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding:14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow:hidden;
    }

    .hero{
      position:relative;
      border-radius:22px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#0b1024;
      aspect-ratio:16 / 10;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hero img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform: scale(1.02);
      filter: saturate(1.05) contrast(1.05);
    }

    .hero .label{
      position:absolute;
      left:14px;
      top:14px;
      padding:12px 14px;
      border-radius:16px;
      background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.25));
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
      max-width: calc(100% - 28px);
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
    }

    .label b{
      display:block;
      font-size:16px;
      margin-bottom:4px;
    }

    .label span{
      font-size:12px;
      color:rgba(255,255,255,.82);
    }

    .hero .mascot-peek{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:34%;
      pointer-events:none;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.26) 55%, rgba(0,0,0,.42));
    }

    .gateAction{
      margin-top:12px;
      display:flex;
      justify-content:center;
    }

    .bigBtn{
      width:100%;
      padding:16px 14px;
      border-radius:18px;
      border:1px solid rgba(247,215,122,.28);
      background: linear-gradient(180deg, rgba(247,215,122,.18), rgba(247,215,122,.08));
      color:var(--text);
      font-size:16px;
      cursor:pointer;
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .bigBtn:active{
      transform: translateY(1px);
    }

    .bigBtn .paw{
      width:18px;
      height:18px;
      display:inline-grid;
      place-items:center;
      filter: drop-shadow(0 0 10px rgba(247,215,122,.35));
    }

    .atmWrap{
      display:none;
      margin-top:12px;
      gap:12px;
    }

    .sectionTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:12px;
      margin-bottom:8px;
    }

    .badge{
      font-size:12px;
      color:rgba(255,255,255,.85);
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      padding:8px 10px;
      border-radius:999px;
      display:inline-flex;
      gap:8px;
      align-items:center;
      user-select:none;
    }

    .badge .miniDot{
      width:9px;
      height:9px;
      border-radius:50%;
      background: rgba(247,215,122,.95);
      box-shadow: 0 0 18px rgba(247,215,122,.45);
    }

    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }

    .pinBox{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      border-radius:18px;
      padding:16px;
      min-height:78px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
    }

    .pinBox .small{
      font-size:12px;
      color:var(--muted);
    }

    .pinBox .pin{
      font-size:22px;
      letter-spacing:.22em;
      font-weight:800;
    }

    .enterBtn{
      width:100%;
      min-height:78px;
      border:1px solid rgba(47,143,122,.45);
      background: linear-gradient(180deg, rgba(47,143,122,.30), rgba(47,143,122,.14));
      border-radius:18px;
      cursor:pointer;
      padding:16px 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:8px;
      user-select:none;
      box-shadow: 0 12px 35px rgba(0,0,0,.25);
      color:#f3fff9;
      font-weight:800;
      font-size:19px;
      text-shadow:0 0 10px rgba(47,143,122,.25);
    }

    .enterBtn:active{
      transform: translateY(1px);
    }

    .receiveBtn{
      width:100%;
      min-height:88px;
      border:1px solid rgba(247,215,122,.28);
      background: linear-gradient(180deg, rgba(247,215,122,.18), rgba(247,215,122,.08));
      border-radius:22px;
      cursor:pointer;
      padding:18px 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:8px;
      user-select:none;
      box-shadow: 0 12px 35px rgba(0,0,0,.25);
    }

    .receiveBtn:active{
      transform: translateY(1px);
    }

    .receiveBtn b{
      display:block;
      font-size:20px;
      color:#fff9dc;
      text-shadow:0 0 10px rgba(247,215,122,.35);
    }

    .receiveBtn span{
      display:block;
      font-size:13px;
      color:#fff2b8;
    }

    .keypad{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
      margin-top:8px;
    }

    .key{
      padding:18px 0;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:var(--text);
      font-size:20px;
      font-weight:800;
      cursor:pointer;
      user-select:none;
      box-shadow: 0 12px 35px rgba(0,0,0,.25);
    }

    .key:active{
      transform: translateY(1px);
    }

    .key.danger{
      background: linear-gradient(180deg, rgba(124,60,75,.35), rgba(124,60,75,.18));
      border-color: rgba(124,60,75,.5);
      font-size:18px;
    }

    .hintLine{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }

    .rewardStage{
      display:none;
      margin-top:14px;
      position:relative;
      border-radius:22px;
      overflow:hidden;
      border:1px solid var(--line);
      background:
        radial-gradient(900px 520px at 50% 35%, rgba(247,215,122,.18), transparent 65%),
        radial-gradient(700px 500px at 20% 0%, rgba(160,120,255,.18), transparent 60%),
        radial-gradient(900px 600px at 80% 0%, rgba(80,200,255,.14), transparent 65%),
        linear-gradient(180deg, rgba(7,10,25,.95), rgba(10,16,42,.95));
      min-height:340px;
      box-shadow: var(--shadow);
    }

    .rewardTop{
      padding:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .rewardTop b{
      font-size:15px;
    }

    .rewardTop span{
      font-size:12px;
      color:var(--muted);
    }

    .rewardArea{
      position:relative;
      height:360px;
      overflow:hidden;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .rewardControls{
      padding:14px;
      display:flex;
      gap:10px;
      flex-direction:column;
    }

    .rewardControlBtn{
      width:100%;
      padding:14px 12px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      color:var(--text);
      cursor:pointer;
      font-size:15px;
      font-weight:800;
    }

    .rewardControlBtn:active{
      transform: translateY(1px);
    }

    .sparkle{
      position:absolute;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.9) 40%, transparent 41%),
        radial-gradient(2px 2px at 70% 20%, rgba(255,255,255,.75) 40%, transparent 41%),
        radial-gradient(1.5px 1.5px at 45% 60%, rgba(255,255,255,.8) 40%, transparent 41%),
        radial-gradient(1.8px 1.8px at 85% 55%, rgba(255,255,255,.7) 40%, transparent 41%),
        radial-gradient(1.6px 1.6px at 30% 80%, rgba(255,255,255,.75) 40%, transparent 41%);
      opacity:.55;
      animation: twinkle 2.6s infinite ease-in-out alternate;
    }

    @keyframes twinkle{
      from{opacity:.35; transform: translateY(0px)}
      to{opacity:.7; transform: translateY(-2px)}
    }

    .modalBack{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9998;
    }

    .modal{
      width:min(420px, 100%);
      background: linear-gradient(180deg, rgba(15,23,48,.95), rgba(10,14,30,.95));
      border:1px solid rgba(255,255,255,.14);
      border-radius:22px;
      box-shadow: var(--shadow);
      padding:14px;
    }

    .modal h3{
      margin:6px 6px 10px;
      font-size:16px;
    }

    .modal p{
      margin:0 6px 12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }

    .modal .modalBtns{
      display:flex;
      gap:10px;
      padding:6px;
    }

    .modal .modalBtns button{
      flex:1;
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:12px 10px;
      font-weight:800;
      color:var(--text);
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
    }

    .modal .modalBtns button.gold{
      border-color: rgba(247,215,122,.35);
      background: rgba(247,215,122,.12);
    }

    .gateMode .topbar{
      display:none;
    }

    .moneyRain{
      position:absolute;
      top:-40px;
      font-size:34px;
      pointer-events:none;
      z-index:8;
      animation: moneyFall 2.4s linear forwards;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.28));
    }

    @keyframes moneyFall{
      0%{
        transform: translateY(-20px) rotate(0deg);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      100%{
        transform: translateY(420px) rotate(18deg);
        opacity:0;
      }
    }

    .mainRewardWrap{
      position:absolute;
      left:50%;
      top:54%;
      transform:translate(-50%, -50%);
      width:min(78%, 320px);
      z-index:20;
      animation: rewardPop .5s ease-out forwards;
      text-align:center;
    }

    .mainRewardImage{
      width:100%;
      display:block;
      border-radius:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }

    .mainRewardTitle{
      margin-top:10px;
      font-size:16px;
      font-weight:800;
      color:var(--text);
      text-shadow:0 2px 8px rgba(0,0,0,.35);
    }

    @keyframes rewardPop{
      0%{
        opacity:0;
        transform:translate(-50%, -44%) scale(.85);
      }
      100%{
        opacity:1;
        transform:translate(-50%, -50%) scale(1);
      }
    }

    @media (max-width: 360px){
      .row{
        grid-template-columns: 1fr 1fr;
      }
      .receiveBtn b{
        font-size:17px;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <div class="topbar" id="topbar">
      <div class="brand">
        <div class="dot"></div>
        <div class="brandtext">
          <b>宇宙銀行ATM</b>
          <span>チャッピー＆サリー</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="pill" id="btnReset">最初から</button>
        <button class="pill gold" id="btnHint">暗証番号ヒント</button>
      </div>
    </div>

    <div class="card">
      <div class="hero" id="hero">
        <img id="heroImg" alt="宇宙銀行" />
        <div class="label" id="heroLabel">
          <b id="heroTitle">ようこそ、宇宙銀行へ</b>
          <span id="heroSub">🐾🔘で入店してね。</span>
        </div>
        <div class="mascot-peek"></div>
      </div>

      <div class="gateAction" id="gateAction">
        <button class="bigBtn" id="btnEnter">
          <span class="paw">🐾</span>
          <span>入店する</span>
          <span style="opacity:.7">🔘</span>
        </button>
      </div>

      <div class="atmWrap" id="atmWrap">
        <div class="sectionTitle">
          <div class="badge"><span class="miniDot"></span><span>ATM</span></div>
          <div class="badge">PIN: <span id="pinDots">◯ ◯ ◯ ◯</span></div>
        </div>

        <div class="row">

  <div class="pinBox">
    <div class="small">暗証番号（4桁）</div>
    <div class="pin" id="pinView">----</div>
  </div>

  <button class="enterBtn" id="btnEnterReward">
    ↩
  </button>

</div>


<div class="keypad" id="keypad">

<button class="key" data-k="1">1</button>
<button class="key" data-k="2">2</button>
<button class="key" data-k="3">3</button>

<button class="key" data-k="4">4</button>
<button class="key" data-k="5">5</button>
<button class="key" data-k="6">6</button>

<button class="key" data-k="7">7</button>
<button class="key" data-k="8">8</button>
<button class="key" data-k="9">9</button>

<button class="key danger" data-k="clear">けす</button>
<button class="key" data-k="0">0</button>

</div>

        <div class="hintLine" id="hintLine">
          ・暗証番号は4桁<br>
          ・4桁入力して Enter を押すと受け取り開始
        </div>
      </div>

      <div class="rewardStage" id="rewardStage">
        <div class="sparkle"></div>
        <div class="rewardTop">
          <div>
            <b id="rewardTitle">REWARD</b><br>
            <span id="rewardSub">受取り増す🐶🐾</span>
          </div>
          <button class="pill" id="btnBackATM">ATMへ戻る</button>
        </div>

        <div class="rewardArea" id="rewardArea"></div>

        <div class="rewardControls">
          <button class="rewardControlBtn" id="btnRewardAgain">もう一回受け取る</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <h3>暗証番号ヒント</h3>
      <p>
        ヒント：しあわせの合図が並んでる数字🐾<br>
        例：8888
      </p>
      <div class="modalBtns">
        <button id="modalClose">とじる</button>
        <button class="gold" id="modalSet8888">8888 を入れる</button>
      </div>
    </div>
  </div>

<script>
  const IMG = {
    gate: "images/cosmic_bank_gate.png",
    atm:  "images/cosmic_bank_atm.png",
    stage2Rewards: [
      {
        src: "images/chappy_sally_house.png",
        title: "しあわせハウスが来たよ🏠"
      },
      {
        src: "images/chappy_sally_car.png",
        title: "しあわせカーで出発〜🚗"
      },
      {
        src: "images/chappy_sally_gold_train.png",
        title: "黄金トレインが到着〜🚂"
      },
      {
        src: "images/chappy_sally_gold_cart.png",
        title: "ゴールドトロッコが来たよ🛤️"
      }
    ]
  };

  const VALID_PINS = ["8888"];

  const app = document.getElementById("app");
  const heroImg = document.getElementById("heroImg");
  const heroLabel = document.getElementById("heroLabel");
  const heroTitle = document.getElementById("heroTitle");
  const heroSub = document.getElementById("heroSub");
  const gateAction = document.getElementById("gateAction");
  const btnEnter = document.getElementById("btnEnter");

  const atmWrap = document.getElementById("atmWrap");
  const pinView = document.getElementById("pinView");
  const pinDots = document.getElementById("pinDots");
  const keypad = document.getElementById("keypad");
  const btnReceive = document.getElementById("btnReceive");
  const btnEnterReward = document.getElementById("btnEnterReward");
  const hintLine = document.getElementById("hintLine");

  const rewardStage = document.getElementById("rewardStage");
  const rewardArea = document.getElementById("rewardArea");
  const rewardTitle = document.getElementById("rewardTitle");
  const rewardSub = document.getElementById("rewardSub");
  const btnRewardAgain = document.getElementById("btnRewardAgain");
  const btnBackATM = document.getElementById("btnBackATM");

  const btnReset = document.getElementById("btnReset");
  const btnHint = document.getElementById("btnHint");

  const modalBack = document.getElementById("modalBack");
  const modalClose = document.getElementById("modalClose");
  const modalSet8888 = document.getElementById("modalSet8888");

  let mode = "gate";
  let pin = "";

  function cacheBust(path){
    return path + "?v=" + Date.now();
  }

  function setHero(src, title, sub){
    heroImg.src = cacheBust(src);
    heroTitle.textContent = title;
    heroSub.textContent = sub;
  }

  function setMode(next){
    mode = next;

    if(mode === "gate"){
      app.classList.add("gateMode");
      heroLabel.style.display = "none";
      setHero(IMG.gate, "", "");
      gateAction.style.display = "flex";
      atmWrap.style.display = "none";
      rewardStage.style.display = "none";
      pin = "";
      updatePinUI();
    }

    if(mode === "atm"){
      app.classList.remove("gateMode");
      heroLabel.style.display = "block";
      setHero(IMG.atm, "宇宙銀行ATM", "暗証番号を入力してね。");
      gateAction.style.display = "none";
      atmWrap.style.display = "block";
      rewardStage.style.display = "none";
      updatePinUI();
    }

    if(mode === "reward"){
      app.classList.remove("gateMode");
      heroLabel.style.display = "none";
      setHero(IMG.gate, "", "");
      gateAction.style.display = "none";
      atmWrap.style.display = "none";
      rewardStage.style.display = "block";
    }
  }

  function updatePinUI(){
    pinView.textContent = (pin + "----").slice(0,4);
    const dots = [];
    for(let i=0;i<4;i++){
      dots.push(i < pin.length ? "●" : "◯");
    }
    pinDots.textContent = dots.join(" ");
    btnReceive.style.opacity = pin.length === 4 ? "1" : ".55";
    btnEnterReward.style.opacity = pin.length === 4 ? "1" : ".55";
    hintLine.innerHTML = "・暗証番号は4桁<br>・4桁入力して Enter を押すと受け取り開始";
  }

  function openModal(){
    modalBack.style.display = "flex";
  }

  function closeModal(){
    modalBack.style.display = "none";
  }

  function clearRewardArea(){
    rewardArea.innerHTML = "";
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    rewardArea.appendChild(sparkle);
  }

  function moneyRainStage(){
    const icons = ["💴","🪙","💴","🪙","💴"];
    for(let i=0;i<26;i++){
      setTimeout(() => {
        const el = document.createElement("div");
        el.className = "moneyRain";
        el.textContent = icons[Math.floor(Math.random() * icons.length)];
        el.style.left = Math.random() * 92 + "%";
        rewardArea.appendChild(el);
        setTimeout(() => el.remove(), 2600);
      }, i * 80);
    }
  }

  function showMainRewardImage(){
    const reward = IMG.stage2Rewards[Math.floor(Math.random() * IMG.stage2Rewards.length)];

    const wrap = document.createElement("div");
    wrap.className = "mainRewardWrap";

    const img = document.createElement("img");
    img.src = cacheBust(reward.src);
    img.alt = reward.title;
    img.className = "mainRewardImage";

    const title = document.createElement("div");
    title.className = "mainRewardTitle";
    title.textContent = reward.title;

    wrap.appendChild(img);
    wrap.appendChild(title);
    rewardArea.appendChild(wrap);

    rewardTitle.textContent = "REWARD";
    rewardSub.textContent = "しあわせ受け取り成功だよ🐾";
  }

  function startRewardFlow(){
    if(pin.length !== 4){
      hintLine.innerHTML = "・暗証番号を4桁入力してね";
      return;
    }

    if(!VALID_PINS.includes(pin)){
      hintLine.innerHTML = "・その暗証番号は違うみたい。ヒントを見てね。";
      return;
    }

    playRewardSequence();
  }

  function playRewardSequence(){
    setMode("reward");
    clearRewardArea();

    rewardTitle.textContent = "REWARD";
    rewardSub.textContent = "受取り増す🐶🐾";

    setTimeout(() => {
      moneyRainStage();
    }, 700);

    setTimeout(() => {
      rewardSub.textContent = "しあわせが届くよ💴🪙";
      showMainRewardImage();
    }, 2400);
  }

  btnEnter.addEventListener("click", () => {
    setMode("atm");
  });

  btnReceive.addEventListener("click", startRewardFlow);
  btnEnterReward.addEventListener("click", startRewardFlow);

  keypad.addEventListener("click", (e) => {
    const b = e.target.closest("button");
    if(!b) return;
    const k = b.dataset.k;

    if(k === "clear"){
      pin = "";
      updatePinUI();
      return;
    }

    if(k === "none"){
      return;
    }

    if(pin.length < 4){
      pin += k;
      updatePinUI();
    }
  });

  btnReset.addEventListener("click", () => {
    setMode("gate");
  });

  btnHint.addEventListener("click", openModal);
  modalClose.addEventListener("click", closeModal);

  modalBack.addEventListener("click", (e) => {
    if(e.target === modalBack){
      closeModal();
    }
  });

  modalSet8888.addEventListener("click", () => {
    pin = "8888";
    updatePinUI();
    closeModal();
  });

  btnBackATM.addEventListener("click", () => {
    setMode("atm");
  });

  btnRewardAgain.addEventListener("click", () => {
    playRewardSequence();
  });

  heroImg.addEventListener("error", () => {
    console.warn("HERO画像が見つからないかも：", heroImg.src);
  });

  setMode("gate");
</script>
</body>
</html>
