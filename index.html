<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>宇宙銀行ATM</title>
  <style>
    :root{
      --bg1:#07101f;
      --bg2:#0b1f3a;
      --card: rgba(255,255,255,.08);
      --card2: rgba(255,255,255,.12);
      --text: #f6f2ff;
      --muted: rgba(246,242,255,.72);
      --accent: #ffd36a;
      --accent2:#ff9bd4;
      --ok:#7CFFB5;
      --danger:#ff6b6b;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      color:var(--text);
      min-height:100svh;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(255,211,106,.18), transparent 60%),
        radial-gradient(900px 500px at 15% 20%, rgba(255,155,212,.12), transparent 60%),
        radial-gradient(900px 600px at 85% 35%, rgba(124,255,181,.10), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    .stars{
      position:fixed; inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.7) 40%, transparent 45%),
        radial-gradient(2px 2px at 70% 20%, rgba(255,255,255,.55) 40%, transparent 45%),
        radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,.45) 40%, transparent 45%),
        radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,.5) 40%, transparent 45%),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,.35) 40%, transparent 45%);
      opacity:.55;
      filter: blur(.2px);
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin: 6px 0 14px;
    }

    .brand{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--accent));
      box-shadow: 0 0 18px rgba(255,211,106,.55);
    }
    .brand b{ letter-spacing:.06em; }
    .brand small{ color:var(--muted); display:block; margin-top:2px; font-size:12px; }

    .tools{
      display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background: var(--card);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.02em;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: transform .08s ease, background .2s ease, border-color .2s ease;
      user-select:none;
    }
    .btn:active{ transform: translateY(1px) scale(.99); }
    .btn.primary{
      border-color: rgba(255,211,106,.35);
      background: linear-gradient(180deg, rgba(255,211,106,.22), rgba(255,211,106,.10));
    }
    .btn.ghost{
      background: transparent;
      border-color: rgba(255,255,255,.18);
      box-shadow:none;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 860px){
      .grid{ grid-template-columns: 1fr; }
      header{ flex-direction:column; align-items:stretch; }
      .tools{ justify-content:space-between; }
    }

    .panel{
      background: var(--card);
      border:1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .screen{
      position:relative;
      aspect-ratio: 16/10;
      min-height: 260px;
      background:
        radial-gradient(600px 260px at 50% 20%, rgba(255,211,106,.16), transparent 60%),
        radial-gradient(520px 240px at 20% 70%, rgba(255,155,212,.10), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }

    .screen img.bg{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      opacity:.88;
      filter: saturate(1.05) contrast(1.02);
      transform: scale(1.01);
    }

    .overlay{
      position:absolute; inset:0;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding: 14px;
    }

    .bubble{
      align-self:flex-start;
      background: rgba(0,0,0,.40);
      border:1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 10px 12px;
      max-width:min(520px, 92%);
      backdrop-filter: blur(8px);
    }
    .bubble .title{
      font-weight:900;
      letter-spacing:.05em;
      margin-bottom:4px;
    }
    .bubble .sub{ color:var(--muted); font-size: 13px; line-height:1.4; }

    .status{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
    }
    .status .left{
      display:flex; align-items:center; gap:10px; min-width:0;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      font-size: 12px;
      color: var(--muted);
      white-space:nowrap;
    }
    .pill b{ color:var(--text); font-size: 12px; }
    .hint{
      color: var(--muted);
      font-size: 12px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .pad{
      padding: 14px;
      display:grid;
      gap: 12px;
    }

    .pin{
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .pin .display{
      flex: 1;
      min-width: 240px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 12px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      backdrop-filter: blur(8px);
    }
    .pin .display .label{
      font-size: 12px;
      color: var(--muted);
    }
    .pin .display .dots{
      display:flex; gap:6px;
      align-items:center;
    }
    .dotpin{
      width:10px; height:10px; border-radius:50%;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.10);
    }
    .dotpin.filled{
      background: radial-gradient(circle at 30% 30%, #fff, var(--accent));
      border-color: rgba(255,211,106,.55);
      box-shadow: 0 0 16px rgba(255,211,106,.35);
    }

    .keypad{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .key{
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
      border-radius: 16px;
      padding: 14px 10px;
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
      cursor:pointer;
      user-select:none;
      box-shadow: 0 10px 26px rgba(0,0,0,.25);
      transition: transform .08s ease, background .2s ease, border-color .2s ease;
    }
    .key:active{ transform: translateY(1px) scale(.99); }
    .key.fn{
      font-size: 14px;
      font-weight: 900;
      letter-spacing:.04em;
      color: var(--muted);
    }
    .key.ok{
      background: linear-gradient(180deg, rgba(124,255,181,.20), rgba(124,255,181,.08));
      border-color: rgba(124,255,181,.35);
      color: var(--text);
    }
    .key.del{
      background: linear-gradient(180deg, rgba(255,107,107,.16), rgba(255,107,107,.06));
      border-color: rgba(255,107,107,.30);
    }

    .side{
      display:grid;
      gap: 14px;
    }

    .card{
      padding: 14px;
    }

    .h2{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin:0 0 10px;
    }
    .h2 h2{
      margin:0;
      font-size: 16px;
      letter-spacing:.04em;
    }
    .h2 span{
      color: var(--muted);
      font-size: 12px;
      white-space:nowrap;
    }

    .list{
      display:grid;
      gap: 10px;
    }
    .item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.10);
    }
    .item b{ font-size: 13px; letter-spacing:.02em; }
    .item small{ color:var(--muted); font-size: 12px; }

    .reward{
      display:grid;
      gap: 10px;
    }
    .reward .frame{
      position: relative;
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      min-height: 220px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 12px;
    }
    .reward img{
      max-width: 100%;
      max-height: 320px;
      object-fit: contain;
      filter: drop-shadow(0 18px 40px rgba(0,0,0,.45));
      transform-origin:center;
    }
    .spark{
      position:absolute;
      inset:-40%;
      background: radial-gradient(circle at 50% 50%, rgba(255,211,106,.24), transparent 60%);
      opacity:0;
      animation: none;
      pointer-events:none;
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      padding: 10px 12px;
      background: rgba(0,0,0,.70);
      border:1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      color: var(--text);
      font-weight: 800;
      font-size: 13px;
      letter-spacing:.02em;
      box-shadow: var(--shadow);
      opacity:0;
      pointer-events:none;
      transition: opacity .22s ease, transform .22s ease;
      backdrop-filter: blur(10px);
      z-index: 50;
      max-width: 92vw;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .toast.show{
      opacity:1;
      transform: translateX(-50%) translateY(-6px);
    }

    .shake{
      animation: shake .25s ease-in-out 0s 2;
    }
    @keyframes shake{
      0%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      50%{ transform: translateX(6px); }
      75%{ transform: translateX(-4px); }
      100%{ transform: translateX(0); }
    }

    .pop{
      animation: pop .45s ease both;
    }
    @keyframes pop{
      0%{ transform: scale(.92); opacity:.0; }
      60%{ transform: scale(1.03); opacity:1; }
      100%{ transform: scale(1); opacity:1; }
    }

    .spin{
      animation: spin 1.6s ease-in-out both;
    }
    @keyframes spin{
      0%{ transform: rotate(-3deg) scale(.96); }
      30%{ transform: rotate(5deg) scale(1.02); }
      100%{ transform: rotate(0deg) scale(1); }
    }

    .sparkOn{
      opacity:1;
      animation: sparkle 1.25s ease both;
    }
    @keyframes sparkle{
      0%{ transform: scale(.8); opacity:0; }
      30%{ opacity:1; }
      100%{ transform: scale(1.15); opacity:0; }
    }

    footer{
      margin-top: 14px;
      color: rgba(246,242,255,.52);
      font-size: 12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="wrap">
    <header>
      <div class="brand">
        <span class="dot"></span>
        <div>
          <b>宇宙銀行ATM</b>
          <small>チャッピー＆サリー</small>
        </div>
      </div>

      <div class="tools">
        <button class="btn ghost" id="btnReset" type="button">最初から</button>
        <button class="btn primary" id="btnHint" type="button">暗証番号ヒント</button>
      </div>
    </header>

    <div class="grid">
      <!-- LEFT: ATM -->
      <section class="panel">
        <div class="screen" id="screen">
          <img class="bg" id="screenBg" alt="背景" />
          <div class="overlay">
            <div class="bubble" id="bubble">
              <div class="title" id="bubbleTitle">ようこそ、宇宙銀行へ</div>
              <div class="sub" id="bubbleSub">暗証番号を入力してね。</div>
            </div>

            <div class="status">
              <div class="left">
                <div class="pill"><b id="modeLabel">GATE</b></div>
                <div class="hint" id="statusHint">数字を4つ入力 → OK</div>
              </div>
              <div class="pill">PIN: <b id="pinMask">••••</b></div>
            </div>
          </div>
        </div>

        <div class="pad">
          <div class="pin">
            <div class="display" id="pinDisplay">
              <div>
                <div class="label">暗証番号</div>
                <div style="font-weight:900; letter-spacing:.08em;" id="pinText">----</div>
              </div>
              <div class="dots" aria-label="入力数" id="pinDots"></div>
            </div>

            <button class="btn primary" id="btnWithdraw" type="button">引き出す</button>
          </div>

          <div class="keypad" id="keypad">
            <!-- keys inserted by JS -->
          </div>
        </div>
      </section>

      <!-- RIGHT: RESULT -->
      <aside class="side">
        <section class="panel card">
          <div class="h2">
            <h2>本日の引き出し</h2>
            <span id="todayLabel">宇宙金庫だよ</span>
          </div>

          <div class="reward">
            <div class="frame" id="rewardFrame">
              <div class="spark" id="spark"></div>
              <img id="rewardImg" alt="報酬画像" style="display:none;" />
              <div id="rewardEmpty" style="text-align:center; color: var(--muted); font-weight:800;">
                まだ出てないよ🐾<br/>暗証番号 → 引き出す
              </div>
            </div>

            <div class="list">
              <div class="item">
                <div>
                  <b id="rewardTitle">---</b><br/>
                  <small id="rewardDesc">---</small>
                </div>
                <div class="pill">LUCK <b id="luckScore">--</b></div>
              </div>
              <div class="item">
                <div>
                  <b>今日の合言葉</b><br/>
                  <small id="magicWords">「うふふふふふっ🤭」</small>
                </div>
                <button class="btn ghost" id="btnCopy" type="button">コピー</button>
              </div>
            </div>
          </div>
        </section>

        <section class="panel card">
          <div class="h2">
            <h2>使い方</h2>
            <span>かんたん</span>
          </div>
          <div class="list">
            <div class="item">
              <div>
                <b>① 4ケタ入力</b><br/>
                <small>数字を押してね</small>
              </div>
              <div class="pill">STEP <b>1</b></div>
            </div>
            <div class="item">
              <div>
                <b>② OK or 引き出す</b><br/>
                <small>どっちでも進む</small>
              </div>
              <div class="pill">STEP <b>2</b></div>
            </div>
            <div class="item">
              <div>
                <b>③ お金さんが出る</b><br/>
                <small>コイン/お札/札束</small>
              </div>
              <div class="pill">STEP <b>3</b></div>
            </div>
          </div>
        </section>
      </aside>
    </div>

    <footer>
      © 宇宙銀行ATM / Chappy & Sally
    </footer>
  </div>

  <div class="toast" id="toast">コピーしたよ</div>

  <script>
    // =========================
    // 設定
    // =========================
    const ASSETS = {
      gate: "images/cosmic_bank_gate.png",
      atm: "images/cosmic_bank_atm.png",
      rewards: [
        {
          key: "1oku",
          title: "一億円 どーん",
          desc: "今日のあなたは豊かさ受け取り上手。",
          img: "images/cosmic_bill_1oku.png",
          luckMin: 88,
          luckMax: 99,
          words: "「受け取り増した〜🤭✨」"
        },
        {
          key: "50oku",
          title: "五十億円 どーん",
          desc: "スケールが宇宙！遠慮なしでOK。",
          img: "images/cosmic_bill_50oku.png",
          luckMin: 92,
          luckMax: 100,
          words: "「宇宙さん、ありがとう🌈」"
        },
        {
          key: "infinity",
          title: "∞ 宇宙マネー",
          desc: "制限解除モード。世界線が軽い。",
          img: "images/cosmic_bill_infinity.png",
          luckMin: 95,
          luckMax: 100,
          words: "「無限にご財増した〜✨」"
        },
        {
          key: "wave",
          title: "うねうね一億円札",
          desc: "流れに乗るほど増える日。",
          img: "images/cosmic_bill_wave.png",
          luckMin: 80,
          luckMax: 98,
          words: "「流れに乗り増した〜🌊」"
        },
        {
          key: "coin",
          title: "宇宙コイン",
          desc: "小さな嬉しい臨時収入の予感。",
          img: "images/cosmic_coin.png",
          luckMin: 70,
          luckMax: 95,
          words: "「コインも愛して増やす🐾」"
        },
        {
          key: "stack",
          title: "金ピカ札束",
          desc: "まとめて受け取りチャンス到来！",
          img: "images/cosmic_money_stack.png",
          luckMin: 85,
          luckMax: 100,
          words: "「ザックザクパラダイス😎」"
        },
        {
          key: "chappy",
          title: "チャッピーコイン",
          desc: "応援パワー全開。やる気が出る！",
          img: "images/chappy_coin.png",
          luckMin: 75,
          luckMax: 98,
          words: "「チャッピー店長、出動っ🐶」"
        },
        {
          key: "sally",
          title: "サリーコイン",
          desc: "かわいさで現実が動く日。",
          img: "images/sally_coin.png",
          luckMin: 75,
          luckMax: 98,
          words: "「サリー、任せて💖」"
        }
      ]
    };

    // 暗証番号（好きに変えてOK）
    // 例：8888 / 7777 / 2525 / 3690 など
    const PIN_CODE = "8888";

    // =========================
    // 便利関数
    // =========================
    const $ = (id) => document.getElementById(id);

    function randInt(min, max){
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pickReward(){
      // ほどよく偏り：札束/∞は少しレア
      const pool = [
        "coin","coin","coin",
        "1oku","1oku","1oku",
        "wave","wave",
        "chappy","sally",
        "50oku",
        "stack",
        "infinity"
      ];
      const key = pool[randInt(0, pool.length - 1)];
      return ASSETS.rewards.find(r => r.key === key) || ASSETS.rewards[0];
    }

    function toast(msg){
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      window.clearTimeout(t._timer);
      t._timer = window.setTimeout(() => t.classList.remove("show"), 1400);
    }

    // =========================
    // 状態
    // =========================
    let pin = "";
    let mode = "GATE"; // GATE -> ATM
    let lastReward = null;

    // =========================
    // UI 初期化
    // =========================
    function initDots(){
      const dots = $("pinDots");
      dots.innerHTML = "";
      for(let i=0;i<4;i++){
        const d = document.createElement("span");
        d.className = "dotpin";
        dots.appendChild(d);
      }
    }

    function updatePinUI(){
      const dots = [...$("pinDots").children];
      dots.forEach((d, i) => d.classList.toggle("filled", i < pin.length));
      $("pinText").textContent = pin.padEnd(4, "-");
      $("pinMask").textContent = "••••";
      $("statusHint").textContent = pin.length < 4 ? "数字を4つ入力 → OK" : "OKで認証 / 引き出すで実行";
    }

    function setScreen(newMode){
      mode = newMode;
      $("modeLabel").textContent = mode;

      if(mode === "GATE"){
        $("screenBg").src = ASSETS.gate;
        $("bubbleTitle").textContent = "ようこそ、宇宙銀行へ";
        $("bubbleSub").textContent = "暗証番号を入力してね。";
      }else{
        $("screenBg").src = ASSETS.atm;
        $("bubbleTitle").textContent = "宇宙銀行ATM";
        $("bubbleSub").textContent = "引き出すボタンで、お金さんが出るよ。";
      }
    }

    function buildKeypad(){
      const keys = [
        "1","2","3",
        "4","5","6",
        "7","8","9",
        "DEL","0","OK"
      ];
      const kp = $("keypad");
      kp.innerHTML = "";

      keys.forEach(k => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "key";
        b.textContent = k === "DEL" ? "けす" : k;

        if(k === "DEL"){
          b.classList.add("fn","del");
        } else if(k === "OK"){
          b.classList.add("fn","ok");
        }

        b.addEventListener("click", () => onKey(k));
        kp.appendChild(b);
      });
    }

    // =========================
    // 動き
    // =========================
    function onKey(k){
      if(k === "DEL"){
        pin = pin.slice(0, -1);
        updatePinUI();
        return;
      }
      if(k === "OK"){
        tryAuth();
        return;
      }
      if(pin.length >= 4) return;
      pin += k;
      updatePinUI();
      // 4桁入ったら軽く自動認証してもOK（でも今回はOK/引き出すで進む）
    }

    function tryAuth(){
      if(pin.length < 4){
        toast("4ケタ入れてね🐾");
        pulse($("pinDisplay"));
        return;
      }
      if(pin === PIN_CODE){
        setScreen("ATM");
        toast("認証OK✨");
        $("bubble").classList.remove("shake");
        $("bubble").classList.add("pop");
        setTimeout(() => $("bubble").classList.remove("pop"), 500);
      }else{
        toast("暗証番号ちがうよ🤭");
        shake($("pinDisplay"));
      }
    }

    function pulse(el){
      el.classList.remove("pop");
      void el.offsetWidth;
      el.classList.add("pop");
      setTimeout(() => el.classList.remove("pop"), 520);
    }

    function shake(el){
      el.classList.remove("shake");
      void el.offsetWidth;
      el.classList.add("shake");
      setTimeout(() => el.classList.remove("shake"), 560);
    }

    function dispense(){
      if(pin.length < 4){
        toast("まず暗証番号🐾");
        pulse($("pinDisplay"));
        return;
      }
      if(pin !== PIN_CODE){
        toast("暗証番号がちがうよ🤭");
        shake($("pinDisplay"));
        return;
      }

      // 認証済みにする
      if(mode !== "ATM") setScreen("ATM");

      const r = pickReward();
      lastReward = r;

      // 画面演出
      $("bubbleTitle").textContent = "引き出し中…";
      $("bubbleSub").textContent = "お金さん、出ておいで〜✨";

      // 右側表示
      const img = $("rewardImg");
      const empty = $("rewardEmpty");
      const spark = $("spark");

      empty.style.display = "none";
      img.style.display = "block";
      img.src = r.img;

      // アニメ
      img.classList.remove("spin","pop");
      void img.offsetWidth;
      img.classList.add("spin","pop");

      spark.classList.remove("sparkOn");
      void spark.offsetWidth;
      spark.classList.add("sparkOn");

      $("rewardTitle").textContent = r.title;
      $("rewardDesc").textContent = r.desc;
      $("luckScore").textContent = String(randInt(r.luckMin, r.luckMax));
      $("magicWords").textContent = r.words;

      toast("ご財増した〜🌈");
      setTimeout(() => {
        $("bubbleTitle").textContent = "宇宙銀行ATM";
        $("bubbleSub").textContent = "もう一回引き出してもOKだよ。";
      }, 750);
    }

    function resetAll(){
      pin = "";
      lastReward = null;
      setScreen("GATE");
      updatePinUI();

      $("rewardImg").style.display = "none";
      $("rewardEmpty").style.display = "block";
      $("rewardTitle").textContent = "---";
      $("rewardDesc").textContent = "---";
      $("luckScore").textContent = "--";
      $("magicWords").textContent = "「うふふふふふっ🤭」";
      toast("リセットしたよ");
    }

    async function copyWords(){
      const text = $("magicWords").textContent || "";
      try{
        await navigator.clipboard.writeText(text);
        toast("コピーしたよ✨");
      }catch{
        // だめなら選択コピー用
        toast("長押しでコピーしてね🐾");
      }
    }

    function showHint(){
      // PINを直接出しすぎない、ゆるいヒント
      const hint = `ヒント：${PIN_CODE[0]}が多め🤭（4ケタ）`;
      toast(hint);
    }

    // =========================
    // 起動
    // =========================
    function boot(){
      initDots();
      buildKeypad();
      setScreen("GATE");
      updatePinUI();

      $("btnWithdraw").addEventListener("click", dispense);
      $("btnReset").addEventListener("click", resetAll);
      $("btnCopy").addEventListener("click", copyWords);
      $("btnHint").addEventListener("click", showHint);

      // 画像が無い時の保険（読み込めなかったら文字で案内）
      $("screenBg").addEventListener("error", () => {
        $("bubbleTitle").textContent = "画像が見つからないかも";
        $("bubbleSub").textContent = "images/ フォルダとファイル名を確認してね。";
      });

      // EnterキーでOK（PC用）
      window.addEventListener("keydown", (e) => {
        if(e.key === "Enter") tryAuth();
        if(e.key === "Backspace") onKey("DEL");
        if(/^[0-9]$/.test(e.key)) onKey(e.key);
      });
    }

    boot();
  </script>
</body>
</html>
