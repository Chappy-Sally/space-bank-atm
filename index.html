<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>宇宙銀行ATM</title>

<style>

body{
background:black;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:40px;
overflow:hidden;
}

h1{
color:gold;
font-size:32px;
}

h2{
color:white;
font-size:18px;
margin-bottom:30px;
}

.atm{
width:320px;
margin:auto;
background:#111;
padding:25px;
border-radius:20px;
box-shadow:0 0 40px gold;
}

.screen{
background:#000;
padding:20px;
border-radius:10px;
margin-bottom:15px;
font-size:20px;
}

input{
font-size:22px;
text-align:center;
margin-bottom:10px;
}

button{
padding:12px 18px;
margin:5px;
font-size:18px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
}

button:hover{
background:#ffd700;
}

.rewardText{
margin-top:20px;
font-size:22px;
}

.money{
position:fixed;
top:-50px;
font-size:30px;
animation:fall 4s linear;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(900px)}
}

</style>
</head>

<body>

<h1>宇宙銀行ATM</h1>
<h2>宇宙銀行ゲート</h2>

<div class="atm">

<div class="screen" id="screen">
暗証番号を入力
</div>

<input type="password" id="pin" maxlength="4">

<br>

<button onclick="login()">OK</button>
<button onclick="receive()">受け取ります</button>

<div class="rewardText" id="rewardText"></div>

</div>

<script>

function login(){

let pin=document.getElementById("pin").value;

if(pin==="7777"){

document.getElementById("screen").innerText="宇宙銀行へようこそ";

}else{

document.getElementById("screen").innerText="暗証番号が違います";

}

}


function receive(){

let rewards=[

"💴 一億円が届いた！",
"💴💴 五億円が届いた！",
"💰 札束ザクザク！",
"🪙 宇宙コインが降ってきた！",
"🐶 チャッピーの祝福！",
"🎀 サリーの祝福！",
"🚂 黄金列車が到着！",
"✨ 宇宙銀行ボーナス！"

];

let r=Math.floor(Math.random()*rewards.length);

document.getElementById("rewardText").innerText=rewards[r];

moneyRain();

}


function moneyRain(){

for(let i=0;i<25;i++){

let m=document.createElement("div");

m.className="money";

let icons=["💴","💰","🪙"];

m.innerText=icons[Math.floor(Math.random()*icons.length)];

m.style.left=Math.random()*100+"%";

document.body.appendChild(m);

setTimeout(()=>{
m.remove();
},4000);

}

}

</script>

</body>
</html>
