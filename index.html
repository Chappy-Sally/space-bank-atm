<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>宇宙銀行ATM｜チャッピー＆サリー</title>
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#1a2238;
      --card:#111a2a;
      --card2:#0f1726;
      --stroke:rgba(255,255,255,.12);
      --stroke2:rgba(255,255,255,.18);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --gold1:#f7d88a;
      --gold2:#d7a64a;
      --ok:#2cc56a;
      --danger:#cf4b5a;
      --shadow: 0 18px 50px rgba(0,0,0,.55);
      --radius: 22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 30% 15%, rgba(120,180,255,.18), transparent 55%),
        radial-gradient(900px 500px at 80% 0%, rgba(255,210,140,.18), transparent 60%),
        radial-gradient(800px 600px at 70% 80%, rgba(170,120,255,.14), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    .wrap{
      max-width: 920px;
      margin: 0 auto;
      padding: 14px 12px 28px;
    }

    /* top pill */
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--stroke);
      box-shadow: 0 10px 25px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      min-width:0;
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--gold1));
      box-shadow: 0 0 14px rgba(255,230,160,.65);
      flex:0 0 auto;
    }
    .title{
      display:flex; flex-direction:column; line-height:1.1;
      min-width:0;
    }
    .title b{font-size:16px; letter-spacing:.06em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .title span{font-size:12px; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

    .btnRow{
      display:flex; gap:10px;
    }

    .btn{
      appearance:none; border:none; cursor:pointer;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--stroke);
      color: var(--text);
      font-weight: 700;
      letter-spacing:.03em;
      box-shadow: 0 10px 22px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .btn:active{transform: translateY(1px) scale(.99)}
    .btn.primary{
      background: linear-gradient(180deg, rgba(255,220,150,.18), rgba(255,220,150,.08));
      border-color: rgba(255,220,150,.28);
    }

    /* main card */
    .panel{
      margin-top: 14px;
      padding: 14px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.05);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero{
      position:relative;
      border-radius: 20px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      min-height: 240px;
    }
    .hero img{
      width:100%;
      height: 270px;
      object-fit: cover;
      display:block;
      filter: saturate(1.08) contrast(1.02);
      transform: scale(1.01);
    }

    .badge{
      position:absolute;
      left: 14px; top: 14px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 30px rgba(0,0,0,.35);
      max-width: 70%;
    }
    .badge b{display:block; font-size:16px; letter-spacing:.06em}
    .badge span{display:block; margin-top:6px; font-size:12px; color:rgba(255,255,255,.75)}

    .modebar{
      position:absolute;
      left: 14px; right: 14px;
      bottom: 14px;
      display:flex;
      gap:10px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(0,0,0,.26);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
      align-items:center;
      justify-content:space-between;
    }
    .chip{
      display:flex; align-items:center; gap:10px;
      color:rgba(255,255,255,.86);
      font-weight:800;
    }
    .chip .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      font-size:12px;
      letter-spacing:.05em;
    }
    .hintLine{
      font-size:12px;
      color:rgba(255,255,255,.74);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:center;
      flex:1;
    }
    .pinMini{
      font-size:12px; color:rgba(255,255,255,.8);
      display:flex; align-items:center; gap:8px;
      white-space:nowrap;
    }
    .pinDotsMini{
      letter-spacing:.2em;
      opacity:.9;
    }

    /* input area */
    .atmRow{
      margin-top: 12px;
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: stretch;
    }

    .pinCard{
      padding: 14px;
      border-radius: 18px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      min-height: 86px;
      display:flex; align-items:center; justify-content:space-between;
      gap: 10px;
    }

    .pinLeft{
      display:flex; flex-direction:column; gap:6px;
      min-width:0;
    }
    .pinLeft span{font-size:12px; color:rgba(255,255,255,.7)}
    .pinValue{
      font-size:20px;
      font-weight:900;
      letter-spacing:.18em;
      white-space:nowrap;
    }
    .dots{
      display:flex; gap:8px; align-items:center;
    }
    .dotPin{
      width:10px; height:10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.07);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.15);
    }
    .dotPin.on{
      background: radial-gradient(circle at 30% 30%, #fff, var(--gold1));
      border-color: rgba(255,230,160,.7);
      box-shadow: 0 0 18px rgba(255,220,140,.55);
    }

    .withdrawBtn{
      width: 120px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,220,150,.22), rgba(255,220,150,.10));
      border: 1px solid rgba(255,220,150,.30);
      color: rgba(255,255,255,.95);
      font-weight: 900;
      letter-spacing:.04em;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease;
    }
    .withdrawBtn:active{transform: translateY(1px) scale(.99)}
    .withdrawBtn small{display:block; font-weight:700; opacity:.75; letter-spacing:.05em; margin-top:4px}

    /* keypad */
    .keypad{
      margin-top: 12px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .key{
      padding: 18px 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 16px 32px rgba(0,0,0,.30);
      color: rgba(255,255,255,.92);
      font-size: 22px;
      font-weight: 900;
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      user-select:none;
      text-align:center;
    }
    .key:active{transform: translateY(1px) scale(.99)}
    .key.sub{
      font-size: 16px;
      font-weight: 900;
    }
    .key.del{
      background: rgba(207,75,90,.18);
      border-color: rgba(207,75,90,.30);
    }
    .key.ok{
      background: rgba(44,197,106,.18);
      border-color: rgba(44,197,106,.30);
    }

    /* overlay result */
    .overlay{
      position:fixed; inset:0;
      display:none;
      align-items:center; justify-content:center;
      padding: 18px;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(10px);
      z-index: 99;
    }
    .overlay.show{display:flex}

    .result{
      width:min(720px, 96vw);
      border-radius: 26px;
      background: rgba(15,23,38,.92);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 30px 90px rgba(0,0,0,.6);
      overflow:hidden;
      position:relative;
    }
    .resultHeader{
      padding: 14px 16px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }
    .resultHeader b{letter-spacing:.06em}
    .close{
      appearance:none; border:none; cursor:pointer;
      width: 42px; height: 42px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.9);
      font-size: 18px;
      font-weight: 900;
    }

    .resultBody{
      padding: 14px 16px 16px;
      display:grid;
      gap: 12px;
    }

    .msg{
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.92);
      line-height:1.5;
    }
    .msg .big{
      font-size: 18px;
      font-weight: 1000;
      letter-spacing:.04em;
      display:block;
      margin-bottom: 4px;
    }
    .msg .small{font-size: 13px; color: rgba(255,255,255,.78)}

    .popWrap{
      position:relative;
      border-radius: 22px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.12);
      background: radial-gradient(900px 240px at 40% 20%, rgba(255,220,150,.10), transparent 60%),
                  radial-gradient(900px 240px at 70% 80%, rgba(120,180,255,.10), transparent 60%),
                  rgba(0,0,0,.28);
      min-height: 290px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
    }

    .popImg{
      width:min(620px, 92%);
      max-height: 320px;
      object-fit: contain;
      transform-origin: center bottom;
      animation: popIn .55s cubic-bezier(.2,.9,.2,1) both;
      filter: drop-shadow(0 20px 38px rgba(0,0,0,.55));
    }

    @keyframes popIn{
      0%{transform: translateY(40px) scale(.86) rotate(-2deg); opacity:0}
      65%{transform: translateY(-8px) scale(1.02) rotate(1deg); opacity:1}
      100%{transform: translateY(0) scale(1) rotate(0deg); opacity:1}
    }

    /* sparkle */
    .sparkle{
      position:absolute; inset:0;
      pointer-events:none;
    }
    .spark{
      position:absolute;
      width: 10px; height: 10px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #fff, rgba(255,220,150,.9));
      box-shadow: 0 0 18px rgba(255,220,150,.65);
      opacity:0;
      animation: twinkle 1.6s ease-in-out infinite;
    }
    @keyframes twinkle{
      0%,100%{transform: translateY(0) scale(.8); opacity:.0}
      30%{opacity:.9}
      60%{transform: translateY(-10px) scale(1.05); opacity:.6}
    }

    /* coin confetti (simple) */
    .coins{
      position:absolute; inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .coin{
      position:absolute;
      width: 16px; height: 16px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #fff, var(--gold1));
      border: 1px solid rgba(255,230,160,.65);
      box-shadow: 0 0 18px rgba(255,220,140,.45);
      animation: fall 1.2s ease-in forwards;
      opacity:.0;
    }
    @keyframes fall{
      0%{transform: translateY(-40px) rotate(0deg) scale(.8); opacity:0}
      15%{opacity:1}
      100%{transform: translateY(360px) rotate(260deg) scale(1.0); opacity:0}
    }

    /* rare glow */
    .rareGlow{
      position:absolute; inset:-2px;
      border-radius: 28px;
      background:
        radial-gradient(900px 320px at 30% 10%, rgba(255,240,180,.26), transparent 60%),
        radial-gradient(900px 320px at 70% 80%, rgba(170,120,255,.20), transparent 60%),
        linear-gradient(90deg, rgba(255,220,150,.12), rgba(120,180,255,.10));
      opacity:0;
      pointer-events:none;
      transition: opacity .18s ease;
    }
    .result.rare .rareGlow{opacity:1}

    @media (max-width: 560px){
      .hero img{height: 250px}
      .withdrawBtn{width: 108px}
      .key{padding: 16px 10px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="dot"></div>
        <div class="title">
          <b>宇宙銀行ATM</b>
          <span>チャッピー＆サリー</span>
        </div>
      </div>
      <div class="btnRow">
        <button class="btn" id="resetBtn">最初から</button>
        <button class="btn primary" id="hintBtn">暗証番号ヒント</button>
      </div>
    </div>

    <div class="panel">
      <div class="hero">
        <img id="heroImg" src="images/cosmic_bank_gate.png" alt="宇宙銀行" />
        <div class="badge">
          <b id="heroTitle">ようこそ、宇宙銀行へ</b>
          <span id="heroSub">暗証番号を入力してね。</span>
        </div>
        <div class="modebar">
          <div class="chip">
            <span class="pill" id="modePill">GATE</span>
          </div>
          <div class="hintLine" id="modeHint">数字を4つ入力 → OK</div>
          <div class="pinMini">
            <span>PIN:</span>
            <span class="pinDotsMini" id="pinMini">••••</span>
          </div>
        </div>
      </div>

      <div class="atmRow">
        <div class="pinCard">
          <div class="pinLeft">
            <span>暗証番号</span>
            <div class="pinValue" id="pinText">----</div>
          </div>
          <div class="dots" id="dots"></div>
        </div>
        <button class="withdrawBtn" id="withdrawBtn">
          引き出す
          <small>ATMから</small>
        </button>
      </div>

      <div class="keypad" id="keypad"></div>
    </div>
  </div>

  <!-- Result Overlay -->
  <div class="overlay" id="overlay">
    <div class="result" id="resultBox" role="dialog" aria-modal="true">
      <div class="rareGlow"></div>
      <div class="resultHeader">
        <b id="resultTitle">ご財が出ました✨</b>
        <button class="close" id="closeBtn">×</button>
      </div>
      <div class="resultBody">
        <div class="msg" id="resultMsg">
          <span class="big">ありがと〜ご財増した〜</span>
          <span class="small">宇宙銀行から、今のあなたにぴったりのご財が届いたよ。</span>
        </div>

        <div class="popWrap" id="popWrap">
          <div class="sparkle" id="sparkle"></div>
          <div class="coins" id="coins"></div>
          <img class="popImg" id="popImg" src="" alt="ご財" />
        </div>

        <button class="btn primary" id="againBtn">もう一回 引き出す</button>
      </div>
    </div>
  </div>

  <script>
    // ====== Assets ======
    const HERO = {
      gate: { img: "images/cosmic_bank_gate.png", title: "ようこそ、宇宙銀行へ", sub: "暗証番号を入力してね。", pill:"GATE", hint:"数字を4つ入力 → OKでATMに切替" },
      atm:  { img: "images/cosmic_bank_atm.png",  title: "宇宙銀行ATM",        sub: "もう一回引き出してもOKだよ。", pill:"ATM",  hint:"OKで認証 / 引き出すで実行" }
    };

    // ノーマル（よく出る）
    const NORMAL_WITHDRAW = [
      { src: "images/cosmic_bill_1oku.png",      label: "一億円" },
      { src: "images/cosmic_bill_50oku.png",     label: "五十億円" },
      { src: "images/cosmic_bill_infinity.png",  label: "∞宇宙マネー" },
      { src: "images/cosmic_bill_wave.png",      label: "うねうね札" },
      { src: "images/cosmic_money_stack.png",    label: "札束" },
      { src: "images/cosmic_coin.png",           label: "宇宙コイン" },
      { src: "images/chappy_coin.png",           label: "チャッピーコイン" },
      { src: "images/sally_coin.png",            label: "サリーコイン" }
    ];

    // レア（出にくい＆特別演出）
    const RARE_WITHDRAW = [
      { src: "images/chappy_sally_gold_train.png", label: "黄金列車ボーナス🚂✨", rare:true },
      { src: "images/chappy_sally_gold_cart.png",  label: "宇宙金庫ボーナス🧰✨", rare:true }
    ];

    // ====== State ======
    const CORRECT_PIN = "8888"; // ここを変えたければ変更OK
    let pin = "";
    let mode = "gate"; // gate | atm

    // ====== Elements ======
    const heroImg = document.getElementById("heroImg");
    const heroTitle = document.getElementById("heroTitle");
    const heroSub = document.getElementById("heroSub");
    const modePill = document.getElementById("modePill");
    const modeHint = document.getElementById("modeHint");
    const pinMini = document.getElementById("pinMini");

    const pinText = document.getElementById("pinText");
    const dots = document.getElementById("dots");
    const keypad = document.getElementById("keypad");

    const resetBtn = document.getElementById("resetBtn");
    const hintBtn = document.getElementById("hintBtn");
    const withdrawBtn = document.getElementById("withdrawBtn");

    const overlay = document.getElementById("overlay");
    const closeBtn = document.getElementById("closeBtn");
    const againBtn = document.getElementById("againBtn");
    const resultTitle = document.getElementById("resultTitle");
    const resultMsg = document.getElementById("resultMsg");
    const popImg = document.getElementById("popImg");
    const popWrap = document.getElementById("popWrap");
    const sparkle = document.getElementById("sparkle");
    const coins = document.getElementById("coins");
    const resultBox = document.getElementById("resultBox");

    // ====== UI Init ======
    function makeDots(){
      dots.innerHTML = "";
      for(let i=0;i<4;i++){
        const d = document.createElement("div");
        d.className = "dotPin";
        dots.appendChild(d);
      }
    }

    function renderPin(){
      const shown = pin.padEnd(4, "-");
      pinText.textContent = shown;
      const children = [...dots.children];
      children.forEach((c, idx) => c.classList.toggle("on", idx < pin.length));
      pinMini.textContent = "••••";
    }

    function setMode(next){
      mode = next;
      const m = HERO[mode];
      heroImg.src = m.img;
      heroTitle.textContent = m.title;
      heroSub.textContent = m.sub;
      modePill.textContent = m.pill;
      modeHint.textContent = m.hint;
    }

    function buildKeypad(){
      keypad.innerHTML = "";
      const keys = [
        "1","2","3",
        "4","5","6",
        "7","8","9",
        "けす","0","OK"
      ];
      keys.forEach(k=>{
        const b = document.createElement("button");
        b.className = "key";
        b.textContent = k;
        if(k==="けす") b.classList.add("del","sub");
        if(k==="OK") b.classList.add("ok","sub");
        b.addEventListener("click", ()=> onKey(k));
        keypad.appendChild(b);
      });
    }

    // ====== Sparkle + Coins ======
    function spawnSparkles(){
      sparkle.innerHTML = "";
      const n = 12;
      for(let i=0;i<n;i++){
        const s = document.createElement("div");
        s.className = "spark";
        const x = 8 + Math.random()*84;
        const y = 8 + Math.random()*60;
        s.style.left = x + "%";
        s.style.top = y + "%";
        s.style.animationDelay = (Math.random()*1.2) + "s";
        s.style.width = (8 + Math.random()*10) + "px";
        s.style.height = s.style.width;
        sparkle.appendChild(s);
      }
    }

    function burstCoins(){
      coins.innerHTML = "";
      const count = 22;
      for(let i=0;i<count;i++){
        const c = document.createElement("div");
        c.className = "coin";
        c.style.left = (Math.random()*100) + "%";
        c.style.top = (-20 - Math.random()*120) + "px";
        c.style.animationDelay = (Math.random()*0.18) + "s";
        c.style.width = (12 + Math.random()*10) + "px";
        c.style.height = c.style.width;
        coins.appendChild(c);
      }
      // 追加で少し遅れて追いコイン
      setTimeout(()=>{
        for(let i=0;i<14;i++){
          const c = document.createElement("div");
          c.className = "coin";
          c.style.left = (Math.random()*100) + "%";
          c.style.top = (-20 - Math.random()*120) + "px";
          c.style.height = c.style.width;
          coins.appendChild(c);
        }
      }, 160);
    }

    // ====== Random Pick ======
    function pickWithdraw(){
      const rareRate = 0.18; // レア出現率（好みで 0.1〜0.25 くらいに調整OK）
      const isRare = Math.random() < rareRate;
      if(isRare && RARE_WITHDRAW.length){
        const item = RARE_WITHDRAW[Math.floor(Math.random()*RARE_WITHDRAW.length)];
        return item;
      }
      return NORMAL_WITHDRAW[Math.floor(Math.random()*NORMAL_WITHDRAW.length)];
    }

    // ====== Overlay ======
    function openResult(item){
      // rare style
      resultBox.classList.toggle("rare", !!item.rare);

      resultTitle.textContent = item.rare ? "レア演出✨ 宇宙ボーナス発生！" : "ご財が出ました✨";

      // message
      if(item.rare){
        resultMsg.innerHTML = `
          <span class="big">${item.label}</span>
          <span class="small">チャッピー＆サリーが、宇宙金庫からご財を運んできたよ🌈</span>
          <span class="small">ありがと〜ご財増した〜！</span>
        `;
      }else{
        resultMsg.innerHTML = `
          <span class="big">ありがと〜ご財増した〜</span>
          <span class="small">「${item.label}」が飛び出したよ🐾✨</span>
        `;
      }

      // image
      popImg.src = item.src;
      popImg.alt = item.label;

      spawnSparkles();
      burstCoins();

      overlay.classList.add("show");
    }

    function closeResult(){
      overlay.classList.remove("show");
    }

    // ====== Actions ======
    function onKey(k){
      if(k === "けす"){
        pin = pin.slice(0, -1);
        renderPin();
        return;
      }
      if(k === "OK"){
        if(pin.length !== 4){
          toast("4桁入れてね🐾");
          return;
        }
        if(pin === CORRECT_PIN){
          setMode("atm");
          toast("認証OK！引き出せるよ✨");
        }else{
          toast("ちがうみたい…もう一回🤭");
        }
        return;
      }
      // number
      if(pin.length < 4){
        pin += k;
        renderPin();
      }
    }

    function withdraw(){
      // gateでもATMでも押せるけど、4桁必須＆正解なら気持ちいい
      if(pin.length !== 4){
        toast("暗証番号を4桁入れてね🐾");
        return;
      }
      if(pin !== CORRECT_PIN){
        toast("暗証番号がちがうかも…🤭");
        return;
      }
      const item = pickWithdraw();
      openResult(item);
    }

    function resetAll(){
      pin = "";
      renderPin();
      setMode("gate");
      toast("最初からスタート🌙");
    }

    function showHint(){
      // 直接見せるより「匂わせ」でもOK。今は分かりやすく。
      toast("ヒント：8が4つだよ🤭✨");
    }

    // simple toast
    let toastTimer = null;
    function toast(text){
      let el = document.getElementById("toast");
      if(!el){
        el = document.createElement("div");
        el.id = "toast";
        el.style.position = "fixed";
        el.style.left = "50%";
        el.style.bottom = "18px";
        el.style.transform = "translateX(-50%)";
        el.style.padding = "12px 14px";
        el.style.borderRadius = "999px";
        el.style.background = "rgba(0,0,0,.55)";
        el.style.border = "1px solid rgba(255,255,255,.14)";
        el.style.color = "rgba(255,255,255,.92)";
        el.style.backdropFilter = "blur(8px)";
        el.style.boxShadow = "0 16px 40px rgba(0,0,0,.45)";
        el.style.fontWeight = "800";
        el.style.letterSpacing = ".02em";
        el.style.zIndex = "100";
        el.style.maxWidth = "92vw";
        el.style.whiteSpace = "nowrap";
        el.style.overflow = "hidden";
        el.style.textOverflow = "ellipsis";
        document.body.appendChild(el);
      }
      el.textContent = text;
      el.style.opacity = "1";
      if(toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>{ el.style.opacity = "0"; }, 1500);
    }

    // ====== Events ======
    withdrawBtn.addEventListener("click", withdraw);
    resetBtn.addEventListener("click", resetAll);
    hintBtn.addEventListener("click", showHint);
    closeBtn.addEventListener("click", closeResult);
    againBtn.addEventListener("click", ()=>{
      closeResult();
      setTimeout(withdraw, 120);
    });
    overlay.addEventListener("click", (e)=>{
      if(e.target === overlay) closeResult();
    });

    // ====== Start ======
    makeDots();
    buildKeypad();
    renderPin();
    setMode("gate");
  </script>
</body>
</html>
