<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>宇宙銀行ATM</title>
  <style>
    :root{
      --bg0:#070a14;
      --bg1:#0b1030;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.09);
      --line: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --gold: rgba(255,215,110,.95);
      --gold2: rgba(255,195,90,.55);
      --ok: rgba(70, 190, 140, .35);
      --danger: rgba(240, 110, 120, .22);
      --shadow: 0 18px 45px rgba(0,0,0,.45);
      --r: 22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 600px at 30% 10%, rgba(90,140,255,.18), transparent 55%),
        radial-gradient(900px 500px at 70% 20%, rgba(255,210,120,.16), transparent 55%),
        radial-gradient(900px 900px at 50% 110%, rgba(120,90,255,.14), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    .wrap{
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    /* header pill */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), rgba(255,220,120,.95) 40%, rgba(255,180,70,.3));
      box-shadow: 0 0 18px rgba(255,220,140,.35);
      flex:0 0 auto;
    }
    .brand .t1{
      font-weight:800;
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand .t2{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brandtxt{min-width:0}

    .actions{
      display:flex; gap:10px; flex:0 0 auto;
    }
    .btn{
      appearance:none;
      border:none;
      color:var(--text);
      font-weight:700;
      border-radius:999px;
      padding:10px 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 20px rgba(0,0,0,.25);
      cursor:pointer;
      transition: transform .08s ease, filter .12s ease;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active{transform: scale(.98)}
    .btn.gold{
      border:1px solid rgba(255,220,140,.35);
      background: linear-gradient(180deg, rgba(255,220,140,.18), rgba(255,255,255,.05));
      box-shadow: 0 12px 26px rgba(255,200,120,.12), 0 10px 20px rgba(0,0,0,.25);
    }

    /* hero card */
    .hero{
      margin-top:16px;
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .heroMedia{
      position:relative;
      aspect-ratio: 16/9;
      min-height: 220px;
      background:#000;
      overflow:hidden;
    }

    .heroMedia img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
      filter: saturate(1.05) contrast(1.02);
      transform: scale(1.01);
    }

    /* ✅ キャラを隠さない：吹き出しは「上側」に固定＋横幅制限 */
    .welcome{
      position:absolute;
      left:16px;
      top:14px;
      max-width: min(380px, 82%);
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(0,0,0,.48);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 26px rgba(0,0,0,.35);
    }
    .welcome .h{
      font-weight:900;
      letter-spacing:.02em;
      margin:0 0 4px;
      font-size: 18px;
    }
    .welcome .p{
      margin:0;
      font-size: 13px;
      color: rgba(255,255,255,.78);
      line-height:1.35;
    }

    /* small status pill bottom */
    .statusPill{
      position:absolute;
      left:16px;
      right:16px;
      bottom:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
    }
    .pillLeft{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .pillTag{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.28);
      font-weight:900;
      font-size: 12px;
      letter-spacing:.06em;
      flex:0 0 auto;
    }
    .pillText{
      font-size: 12px;
      color: rgba(255,255,255,.78);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pillRight{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      color: rgba(255,255,255,.78);
      font-size: 12px;
    }
    .dots{
      display:flex; gap:6px;
    }
    .dotS{
      width:8px;height:8px;border-radius:999px;
      background: rgba(255,255,255,.18);
      box-shadow:none;
    }
    .dotS.on{
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), rgba(255,220,120,.95));
      box-shadow: 0 0 12px rgba(255,220,140,.25);
    }

    /* ATM panel */
    .panel{
      padding: 14px;
    }

    .atmRow{
      display:grid;
      grid-template-columns: 1fr 150px;
      gap: 12px;
      margin-top: 12px;
    }

    .pinBox{
      border-radius: 18px;
      background: rgba(0,0,0,.24);
      border:1px solid rgba(255,255,255,.14);
      padding: 14px 14px;
      min-height: 76px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .pinLeft{
      min-width:0;
    }
    .pinLabel{
      font-size: 12px;
      color: rgba(255,255,255,.7);
      letter-spacing:.06em;
      margin-bottom:6px;
    }
    .pinValue{
      font-weight:900;
      font-size: 26px;
      letter-spacing:.18em;
    }

    .withdrawBtn{
      border-radius: 18px;
      border:1px solid rgba(255,220,140,.22);
      background: linear-gradient(180deg, rgba(255,220,140,.16), rgba(255,255,255,.04));
      box-shadow: 0 16px 26px rgba(0,0,0,.25);
      padding: 14px 12px;
      cursor:pointer;
      text-align:center;
      font-weight: 900;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .08s ease, filter .12s ease;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
    }
    .withdrawBtn:active{transform: scale(.98)}
    .withdrawBtn small{
      display:block;
      font-weight:800;
      color: rgba(255,255,255,.75);
      letter-spacing:.04em;
    }

    .keypad{
      margin-top: 12px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .key{
      border-radius: 18px;
      padding: 16px 0;
      text-align:center;
      font-size: 22px;
      font-weight: 900;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 12px 24px rgba(0,0,0,.22);
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .08s ease, filter .12s ease;
    }
    .key:active{transform: scale(.98)}
    .key.sub{
      font-size: 18px;
      font-weight: 900;
    }
    .key.danger{
      background: linear-gradient(180deg, var(--danger), rgba(255,255,255,.04));
      border:1px solid rgba(240,110,120,.22);
    }
    .key.ok{
      background: linear-gradient(180deg, var(--ok), rgba(255,255,255,.04));
      border:1px solid rgba(70,190,140,.25);
    }

    /* toast */
    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(520px, calc(100% - 22px));
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(0,0,0,.62);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 34px rgba(0,0,0,.45);
      opacity:0;
      pointer-events:none;
      transition: opacity .2s ease, transform .2s ease;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      z-index: 50;
    }
    .toast.show{
      opacity:1;
      transform: translateX(-50%) translateY(-4px);
    }
    .toast .t{
      font-weight:900;
    }
    .toast .x{
      border:none;
      background: rgba(255,255,255,.09);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      font-weight:900;
      cursor:pointer;
    }

    /* modal */
    .modalBack{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 60;
    }
    .modalBack.show{display:flex;}
    .modal{
      width:min(560px, 100%);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.18);
      box-shadow: 0 24px 55px rgba(0,0,0,.55);
      backdrop-filter: blur(12px);
      padding: 16px;
    }
    .modal h3{
      margin:0 0 8px;
      font-weight: 950;
      letter-spacing:.02em;
    }
    .modal p{
      margin:0 0 10px;
      color: rgba(255,255,255,.78);
      line-height:1.5;
    }
    .modal .row{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top: 10px;
    }

    /* 💸 money burst (random) */
    .burstLayer{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index: 8;
    }
    .money{
      position:absolute;
      width: 140px;
      height:auto;
      opacity:0;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.35));
      animation: fly 1.25s ease-out forwards;
    }
    @keyframes fly{
      0%{
        transform: translate(var(--sx), var(--sy)) rotate(var(--rot)) scale(.72);
        opacity:0;
      }
      10%{opacity:1;}
      75%{opacity:1;}
      100%{
        transform: translate(var(--tx), var(--ty)) rotate(calc(var(--rot) + 18deg)) scale(1.02);
        opacity:0;
      }
    }

    /* responsive */
    @media (max-width: 520px){
      .atmRow{grid-template-columns: 1fr 128px;}
      .pinValue{font-size: 24px;}
      .welcome .h{font-size: 17px;}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <div class="brandtxt">
          <div class="t1">宇宙銀行ATM</div>
          <div class="t2">チャッピー＆サリー</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="resetBtn">最初から</button>
        <button class="btn gold" id="hintBtn">暗証番号ヒント</button>
      </div>
    </div>

    <section class="hero" id="hero">
      <div class="heroMedia">
        <img id="mainImg" src="images/cosmic_bank_gate.png" alt="宇宙銀行ゲート" />
        <div class="burstLayer" id="burst"></div>

        <div class="welcome" id="welcomeBox">
          <p class="h" id="welcomeTitle">ようこそ、宇宙銀行へ</p>
          <p class="p" id="welcomeText">暗証番号を入力してね。</p>
        </div>

        <div class="statusPill">
          <div class="pillLeft">
            <span class="pillTag" id="modeTag">GATE</span>
            <span class="pillText" id="pillText">数字を4つ入力 → OKでATMに切替</span>
          </div>
          <div class="pillRight">
            <span>PIN:</span>
            <div class="dots" id="pinDotsTop" aria-label="pin dots top"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="atmRow">
          <div class="pinBox">
            <div class="pinLeft">
              <div class="pinLabel">暗証番号</div>
              <div class="pinValue" id="pinValue">----</div>
            </div>
            <div class="dots" id="pinDots" aria-label="pin dots"></div>
          </div>

          <div class="withdrawBtn" id="withdrawBtn">
            引き出す
            <small id="withdrawSub">ATMから</small>
          </div>
        </div>

        <div class="keypad" id="keypad">
          <!-- numbers -->
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast">
    <div class="t" id="toastText">ありがと〜ご財増した〜</div>
    <button class="x" id="toastClose">OK</button>
  </div>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <h3>暗証番号ヒント</h3>
      <p>あなたの「宇宙銀行暗証番号」を入れてね✨</p>
      <p style="margin-top:6px; font-weight:900;">例：8888 / 7777 / 3690 など</p>
      <p style="margin-top:6px;">OKでATMに切り替わって、引き出し演出ができるよ💸</p>
      <div class="row">
        <button class="btn" id="modalClose">とじる</button>
      </div>
    </div>
  </div>

  <script>
    // ===== settings =====
    const IMG_GATE = "images/cosmic_bank_gate.png";
    const IMG_ATM  = "images/cosmic_bank_atm.png";

    const MONEY_IMAGES = [
      "images/cosmic_bill_10ku.png",
      "images/cosmic_bill_50ku.png",
      "images/cosmic_bill_infinity.png",
      "images/cosmic_bill_wave.png",
      "images/cosmic_money_stack.png",
      "images/chappy_coin.png",
      "images/sally_coin.png"
    ];

    // ===== state =====
    let pin = "";
    let mode = "GATE"; // GATE or ATM

    // ===== el =====
    const mainImg = document.getElementById("mainImg");
    const modeTag = document.getElementById("modeTag");
    const pillText = document.getElementById("pillText");
    const pinValue = document.getElementById("pinValue");
    const pinDots = document.getElementById("pinDots");
    const pinDotsTop = document.getElementById("pinDotsTop");
    const keypad = document.getElementById("keypad");
    const toast = document.getElementById("toast");
    const toastText = document.getElementById("toastText");
    const toastClose = document.getElementById("toastClose");
    const burst = document.getElementById("burst");

    const resetBtn = document.getElementById("resetBtn");
    const hintBtn = document.getElementById("hintBtn");
    const withdrawBtn = document.getElementById("withdrawBtn");
    const withdrawSub = document.getElementById("withdrawSub");

    const modalBack = document.getElementById("modalBack");
    const modalClose = document.getElementById("modalClose");

    const welcomeTitle = document.getElementById("welcomeTitle");
    const welcomeText = document.getElementById("welcomeText");

    // ===== helpers =====
    function renderDots(targetEl){
      targetEl.innerHTML = "";
      for(let i=0;i<4;i++){
        const d = document.createElement("span");
        d.className = "dotS" + (i < pin.length ? " on" : "");
        targetEl.appendChild(d);
      }
    }

    function render(){
      // top + bottom dots
      renderDots(pinDots);
      renderDots(pinDotsTop);

      // pin value
      pinValue.textContent = (pin + "----").slice(0,4);

      // mode
      modeTag.textContent = mode;

      if(mode === "GATE"){
        mainImg.src = IMG_GATE;
        pillText.textContent = "数字を4つ入力 → OKでATMに切替";
        withdrawSub.textContent = "（まだ入れない）";
        withdrawBtn.style.filter = "grayscale(1) brightness(.9)";
        withdrawBtn.style.pointerEvents = "none";
        welcomeTitle.textContent = "ようこそ、宇宙銀行へ";
        welcomeText.textContent = "暗証番号を入力してね。";
      }else{
        mainImg.src = IMG_ATM;
        pillText.textContent = "OKで認証 / 引き出すで実行";
        withdrawSub.textContent = "ATMから";
        withdrawBtn.style.filter = "none";
        withdrawBtn.style.pointerEvents = "auto";
        welcomeTitle.textContent = "宇宙銀行ATM";
        welcomeText.textContent = "もう一回引き出してもOKだよ。";
      }
    }

    function showToast(msg){
      toastText.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=>toast.classList.remove("show"), 1600);
    }

    function rand(min,max){ return Math.random()*(max-min)+min; }

    function moneyBurst(){
      // 1回で4〜7個飛ばす
      const count = Math.floor(rand(4,8));
      const rect = burst.getBoundingClientRect();

      for(let i=0;i<count;i++){
        const img = document.createElement("img");
        img.className = "money";
        img.src = MONEY_IMAGES[Math.floor(Math.random()*MONEY_IMAGES.length)];
        img.alt = "money";

        // start (ATM出口っぽく右側寄り)
        const sx = rect.width * 0.70 + rand(-40, 40);
        const sy = rect.height * 0.70 + rand(-20, 30);

        // target（上方向に飛ぶ）
        const tx = rand(-60, rect.width + 60);
        const ty = rand(-140, rect.height * 0.20);

        const rot = rand(-18, 18);

        img.style.left = "0px";
        img.style.top  = "0px";
        img.style.setProperty("--sx", sx + "px");
        img.style.setProperty("--sy", sy + "px");
        img.style.setProperty("--tx", tx + "px");
        img.style.setProperty("--ty", ty + "px");
        img.style.setProperty("--rot", rot + "deg");

        burst.appendChild(img);

        // cleanup
        img.addEventListener("animationend", ()=> img.remove());
      }
    }

    function setMode(next){
      mode = next;
      pin = ""; // mode切替のたびにクリア（気持ちよく）
      render();
    }

    // ===== keypad build =====
    function addKey(label, onClick, extraClass=""){
      const b = document.createElement("div");
      b.className = "key " + (extraClass||"");
      b.textContent = label;
      b.addEventListener("click", onClick);
      keypad.appendChild(b);
    }

    function buildKeypad(){
      keypad.innerHTML = "";
      // 1-9
      for(let n=1;n<=9;n++){
        addKey(String(n), ()=> inputDigit(String(n)));
      }
      // clear / 0 / ok
      addKey("けす", ()=> clearPin(), "sub danger");
      addKey("0", ()=> inputDigit("0"));
      addKey("OK", ()=> okAction(), "sub ok");
    }

    function inputDigit(d){
      if(pin.length >= 4) return;
      pin += d;
      render();
      // 4桁埋まったら軽く“入った感”
      if(pin.length === 4) showToast("PIN入力OK✨");
    }

    function clearPin(){
      pin = "";
      render();
      showToast("けしたよ🐾");
    }

    function okAction(){
      if(pin.length < 4){
        showToast("4桁いれてね🐾");
        return;
      }
      // GATEならATMへ
      if(mode === "GATE"){
        showToast("ゲートOPEN✨ ATMへ！");
        setMode("ATM");
        return;
      }
      // ATMのOKは「認証」
      showToast("認証OK✨");
    }

    // Withdraw action
    function withdraw(){
      if(mode !== "ATM"){
        showToast("まずOKでATMへ🐾");
        return;
      }
      if(pin.length < 4){
        showToast("4桁いれてね🐾");
        return;
      }
      moneyBurst();
      showToast("ありがと〜ご財増した〜💸✨");
    }

    // ===== modal =====
    hintBtn.addEventListener("click", ()=>{
      modalBack.classList.add("show");
    });
    modalClose.addEventListener("click", ()=>{
      modalBack.classList.remove("show");
    });
    modalBack.addEventListener("click", (e)=>{
      if(e.target === modalBack) modalBack.classList.remove("show");
    });

    // ===== buttons =====
    resetBtn.addEventListener("click", ()=>{
      setMode("GATE");
      showToast("最初から🐶🌈");
    });
    withdrawBtn.addEventListener("click", withdraw);
    toastClose.addEventListener("click", ()=> toast.classList.remove("show"));

    // ===== init =====
    buildKeypad();
    render();
  </script>
</body>
</html>
