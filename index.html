<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>宇宙銀行ATM｜チャッピー＆サリー</title>
  <style>
    :root{
      --bg1:#0a0f22;
      --bg2:#050814;
      --panel: rgba(20,26,45,.65);
      --panel2: rgba(10,12,22,.55);
      --stroke: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
      --gold: rgba(255,210,120,.95);
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      min-height:100vh;
      background: radial-gradient(circle at 50% 20%, #1b2b5a, var(--bg2) 70%);
      display:flex;
      justify-content:center;
      padding: 18px 12px 30px;
    }

    .app{
      width:min(860px, 100%);
    }

    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--stroke);
      border-radius: 999px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 220px;
    }
    .dot{
      width:10px;height:10px;border-radius:999px;
      background: var(--gold);
      box-shadow: 0 0 10px rgba(255,210,120,.6);
    }
    .titleWrap{ line-height:1.1; }
    .title{ font-weight:700; letter-spacing:.02em; }
    .sub{ font-size:12px; color: var(--muted); margin-top:3px; }

    .tabs{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .pill{
      border-radius: 999px;
      padding: 10px 14px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-weight:600;
      cursor:pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.25) inset;
    }
    .pill.active{
      border-color: rgba(255,210,120,.35);
      background: rgba(255,210,120,.10);
    }

    .stage{
      margin-top: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }

    /* 画像エリア */
    .hero{
      position:relative;
      padding: 14px;
    }
    .heroFrame{
      border-radius: 18px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      position:relative;
    }
    .heroImg{
      width:100%;
      height: 240px;
      object-fit: cover;
      display:block;

      /* 白フチ/背景に見えるものを軽減（完全保証ではない） */
      mix-blend-mode: normal;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,.35));
      image-rendering: auto;
    }
    .badge{
      position:absolute;
      left: 18px;
      top: 18px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(10,12,22,.65);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      max-width: min(75%, 420px);
    }
    .badge .b1{ font-weight:800; font-size:18px; }
    .badge .b2{ margin-top:6px; color: var(--muted); font-size:13px; }

    /* 下の操作パネル */
    .panel{
      padding: 14px;
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 12px;
    }
    @media (max-width:720px){
      .panel{ grid-template-columns: 1fr; }
      .heroImg{ height: 220px; }
    }

    .card{
      background: rgba(12,16,30,.62);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }

    .label{
      font-size:12px;
      color: var(--muted);
      letter-spacing:.04em;
    }
    .pinBox{
      display:flex;
      align-items:center;
      gap: 10px;
      justify-content:flex-end;
    }
    .dots{
      display:flex;
      gap: 8px;
      align-items:center;
    }
    .dotPin{
      width:10px;height:10px;border-radius:999px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.06);
    }
    .dotPin.filled{
      background: rgba(255,210,120,.95);
      border-color: rgba(255,210,120,.55);
      box-shadow: 0 0 10px rgba(255,210,120,.4);
    }

    .pinValue{
      font-weight:900;
      font-size: 28px;
      letter-spacing: .18em;
      padding-left: 6px;
      color: rgba(255,255,255,.92);
    }

    .btnBig{
      width:100%;
      padding: 18px 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      color: var(--text);
      font-weight: 900;
      cursor:pointer;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    .btnBig .small{
      display:block;
      margin-top:4px;
      font-size: 12px;
      color: var(--muted);
      font-weight:700;
      letter-spacing:.04em;
    }
    .btnBig.gold{
      border-color: rgba(255,210,120,.20);
      background: linear-gradient(180deg, rgba(255,210,120,.22), rgba(255,210,120,.08));
    }

    .keypad{
      margin-top: 12px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .key{
      padding: 16px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      cursor:pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.18) inset;
      user-select:none;
    }
    .key:active{ transform: translateY(1px); }

    .key.del{
      background: rgba(255,120,120,.10);
      border-color: rgba(255,120,120,.18);
    }
    .key.ok{
      background: rgba(120,255,180,.10);
      border-color: rgba(120,255,180,.20);
    }

    /* 受け取り演出 */
    .burstLayer{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .money{
      position:absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%,-50%);
      width: clamp(64px, 12vw, 96px);
      opacity:0;
      filter: drop-shadow(0 12px 20px rgba(0,0,0,.45));
      /* 白っぽい縁を目立たせにくくする */
      mix-blend-mode: normal;
    }
    .money.fly{
      animation: fly 1.1s ease-out forwards;
    }
    @keyframes fly{
      0%{
        opacity:0;
        transform: translate(-50%,-50%) scale(.65) rotate(0deg);
      }
      10%{ opacity:1; }
      100%{
        opacity:0;
        transform: translate(var(--dx), var(--dy)) scale(var(--sc)) rotate(var(--rt));
      }
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(10,12,22,.82);
      border: 1px solid rgba(255,255,255,.12);
      padding: 12px 14px;
      border-radius: 14px;
      color: rgba(255,255,255,.92);
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      display:none;
      max-width: min(92vw, 560px);
      z-index: 999;
    }

    /* 表示切替 */
    .hidden{ display:none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="dot"></div>
        <div class="titleWrap">
          <div class="title">宇宙銀行ATM</div>
          <div class="sub">チャッピー＆サリー</div>
        </div>
      </div>

      <div class="tabs">
        <button class="pill" id="btnReset">最初から</button>
        <button class="pill active" id="btnHint">暗証番号ヒント</button>
      </div>
    </div>

    <div class="stage" id="stage">
      <!-- 演出レイヤー（共通） -->
      <div class="burstLayer" id="burstLayer"></div>

      <div class="hero">
        <div class="heroFrame">
          <img id="mainImg" class="heroImg" alt="宇宙銀行の画像" />
          <div class="badge" id="badge">
            <div class="b1" id="badgeTitle">ようこそ、宇宙銀行へ</div>
            <div class="b2" id="badgeText">🐾🔘 で入店してね。</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <!-- 左：PIN表示 -->
        <div class="card" id="leftCard">
          <div class="row">
            <div>
              <div class="label" id="sceneLabel">GATE</div>
              <div class="sub" style="margin-top:6px" id="sceneHelp">入店したらATMへ切り替わるよ</div>
            </div>
            <div class="pinBox">
              <div class="label">PIN:</div>
              <div class="dots" id="pinDots"></div>
            </div>
          </div>

          <div class="row" style="margin-top:14px">
            <div>
              <div class="label">暗証番号</div>
              <div class="pinValue" id="pinValue">----</div>
            </div>
            <button class="btnBig gold" id="primaryBtn">
              🐾🔘 入店
              <span class="small">宇宙銀行へ</span>
            </button>
          </div>

          <!-- テンキー（ATM時だけ） -->
          <div class="keypad hidden" id="keypad">
            <div class="key" data-key="1">1</div>
            <div class="key" data-key="2">2</div>
            <div class="key" data-key="3">3</div>
            <div class="key" data-key="4">4</div>
            <div class="key" data-key="5">5</div>
            <div class="key" data-key="6">6</div>
            <div class="key" data-key="7">7</div>
            <div class="key" data-key="8">8</div>
            <div class="key" data-key="9">9</div>
            <div class="key del" data-key="del">けす</div>
            <div class="key" data-key="0">0</div>
            <div class="key ok" data-key="ok">OK</div>
          </div>
        </div>

        <!-- 右：アクション -->
        <div class="card">
          <div class="label">操作</div>

          <button class="btnBig" id="secondaryBtn" style="margin-top:12px">
            受け取ります 🔘
            <span class="small">ATMから</span>
          </button>

          <div style="margin-top:12px;color:var(--muted);font-size:12px;line-height:1.6">
            ・暗証番号は4桁<br/>
            ・「受け取ります」で演出が始まるよ<br/>
            ・ランダム：トロッコ／トレイン／札束／1億／5億
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ====== ここを必要なら変える（画像の場所） ======
    // GitHub Pages: /space-bank-atm/ の場合でも相対でOKにしてある
    const IMG = {
      gate: "images/cosmic_bank_gate.png",
      atm:  "images/cosmic_bank_atm.png",

      // 報酬（この名前で images/ に入れてね）
      rewards: [
        {src:"images/cosmic_bill_1oku.png",  name:"一億円"},
        {src:"images/cosmic_bill_5oku.png",  name:"五億円"},
        {src:"images/cosmic_money_stack.png",name:"札束"},
        {src:"images/cosmic_bill_wave.png",  name:"波動札束"},
        {src:"images/cosmic_bill_infinity.png",name:"無限札束"},

        // 追加したい演出（このファイル名で入れたら出る）
        {src:"images/cosmic_trocco.png", name:"トロッコ"},
        {src:"images/cosmic_train.png",  name:"トレイン"},
      ]
    };

    // ====== 状態 ======
    let scene = "GATE"; // "GATE" | "ATM" | "REWARD"
    let pin = "";
    let unlocked = false; // OK押したらtrue

    // ====== DOM ======
    const mainImg = document.getElementById("mainImg");
    const badgeTitle = document.getElementById("badgeTitle");
    const badgeText  = document.getElementById("badgeText");
    const sceneLabel = document.getElementById("sceneLabel");
    const sceneHelp  = document.getElementById("sceneHelp");
    const pinValue   = document.getElementById("pinValue");
    const pinDots    = document.getElementById("pinDots");
    const keypad     = document.getElementById("keypad");
    const primaryBtn = document.getElementById("primaryBtn");
    const secondaryBtn = document.getElementById("secondaryBtn");
    const burstLayer = document.getElementById("burstLayer");
    const toast = document.getElementById("toast");

    const btnReset = document.getElementById("btnReset");
    const btnHint  = document.getElementById("btnHint");

    // ====== 初期化 ======
    init();

    function init(){
      buildDots();
      goGate();
      wire();
    }

    function wire(){
      primaryBtn.addEventListener("click", () => {
        if(scene === "GATE") goATM();
      });

      secondaryBtn.addEventListener("click", () => {
        if(scene === "GATE"){
          showToast("まず 🐾🔘 で入店してね🐾");
          return;
        }
        if(pin.length < 4){
          showToast("暗証番号を4桁いれてね🐾");
          return;
        }
        if(!unlocked){
          showToast("OKで認証してから受け取ろう🐾");
          return;
        }
        startReward();
      });

      keypad.addEventListener("click", (e)=>{
        const k = e.target?.dataset?.key;
        if(!k) return;

        if(k === "del"){
          pin = pin.slice(0,-1);
          unlocked = false;
          updatePinUI();
          return;
        }
        if(k === "ok"){
          if(pin.length < 4){
            showToast("4桁そろえてからOKね🐾");
            return;
          }
          unlocked = true;
          showToast("認証OK🐾 受け取ります🔘 を押してね");
          updatePinUI();
          return;
        }

        if(pin.length >= 4) return;
        pin += k;
        unlocked = false;
        updatePinUI();
      });

      btnReset.addEventListener("click", resetAll);
      btnHint.addEventListener("click", () => {
        showToast("ヒント：あなたの“宇宙銀行暗証番号”をどうぞ🐾✨（例：8888/7777など）");
      });
    }

    // ====== 画面遷移 ======
    function goGate(){
      scene = "GATE";
      unlocked = false;
      pin = "";
      updatePinUI();

      mainImg.src = IMG.gate;
      mainImg.style.display = "block";

      badgeTitle.textContent = "ようこそ、宇宙銀行へ";
      badgeText.textContent  = "🐾🔘 で入店してね。";

      sceneLabel.textContent = "GATE";
      sceneHelp.textContent  = "入店したらATMへ切り替わるよ";

      keypad.classList.add("hidden");

      primaryBtn.innerHTML = `🐾🔘 入店<span class="small">宇宙銀行へ</span>`;
      secondaryBtn.innerHTML = `受け取ります 🔘<span class="small">ATMから</span>`;

      document.body.style.background =
        "radial-gradient(circle at 50% 20%, #1b2b5a, #050814 70%)";
    }

    function goATM(){
      scene = "ATM";
      unlocked = false;
      pin = "";
      updatePinUI();

      mainImg.src = IMG.atm;
      mainImg.style.display = "block";

      badgeTitle.textContent = "宇宙銀行ATM";
      badgeText.textContent  = "暗証番号を入力してね。";

      sceneLabel.textContent = "ATM";
      sceneHelp.textContent  = "OKで認証 / 受け取りますで実行";

      keypad.classList.remove("hidden");

      primaryBtn.innerHTML = `最初から<span class="small">ゲートへ</span>`;
      primaryBtn.onclick = resetAll; // 入店ボタンを「最初から」に

      secondaryBtn.innerHTML = `受け取ります 🔘<span class="small">ATMから</span>`;
    }

    function startReward(){
      scene = "REWARD";

      // ATM画像を消す（ここがポイント）
      mainImg.style.display = "none";

      // 背景を宇宙っぽく
      document.body.style.background =
        "radial-gradient(circle at 50% 20%, #2a1b5a, #050814 70%)";

      badgeTitle.textContent = "ご財増しタイム✨";
      badgeText.textContent  = "ランダムで飛び出すよ〜！";

      sceneLabel.textContent = "REWARD";
      sceneHelp.textContent  = "もう一回受け取ってもOKだよ🐾";

      // ここで演出
      rewardBurst();
      showToast("ありがと〜ご財増した〜💸✨");
    }

    function resetAll(){
      // primaryBtnのonclickを戻す
      primaryBtn.onclick = null;
      primaryBtn.addEventListener("click", () => {
        if(scene === "GATE") goATM();
      }, {once:true});

      goGate();
      clearBurst();
    }

    // ====== PIN UI ======
    function buildDots(){
      pinDots.innerHTML = "";
      for(let i=0;i<4;i++){
        const d = document.createElement("div");
        d.className = "dotPin";
        pinDots.appendChild(d);
      }
    }
    function updatePinUI(){
      pinValue.textContent = (pin + "----").slice(0,4);
      [...pinDots.children].forEach((d,i)=>{
        d.classList.toggle("filled", i < pin.length);
      });

      // 認証済みならちょっとだけ雰囲気出す
      if(unlocked){
        badgeText.textContent = "認証OK！受け取ります🔘 を押してね。";
      }
    }

    // ====== 報酬演出 ======
    function rewardBurst(){
      clearBurst();

      // ランダムで1種類を選ぶ
      const pool = IMG.rewards.slice();
      const pick = pool[Math.floor(Math.random()*pool.length)];

      // 1回の押下で「同じ画像を複数」飛ばす（気持ちいい）
      const count = 8 + Math.floor(Math.random()*5); // 8〜12個

      for(let i=0;i<count;i++){
        spawnMoney(pick.src, i);
      }
    }

    function spawnMoney(src, i){
      const el = document.createElement("img");
      el.className = "money";
      el.alt = "reward";
      el.src = src;

      // 画面中央付近から飛ばす
      const rect = document.getElementById("stage").getBoundingClientRect();
      const dx = (Math.random()*2 - 1) * (rect.width * (0.45 + Math.random()*0.25));
      const dy = (Math.random()*-1) * (rect.height * (0.35 + Math.random()*0.35)) + (Math.random()*60);

      const sc = 0.70 + Math.random()*0.55;
      const rt = (Math.random()*2 - 1) * 70;

      el.style.setProperty("--dx", dx + "px");
      el.style.setProperty("--dy", dy + "px");
      el.style.setProperty("--sc", sc);
      el.style.setProperty("--rt", rt + "deg");

      // 少しずつ時間差で
      setTimeout(()=>{
        burstLayer.appendChild(el);
        el.classList.add("fly");
      }, i * 35);

      // アニメ終わったら掃除
      setTimeout(()=> el.remove(), 1400 + i*35);
    }

    function clearBurst(){
      burstLayer.innerHTML = "";
    }

    // ====== Toast ======
    let toastTimer = null;
    function showToast(msg){
      toast.textContent = msg;
      toast.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=> toast.style.display = "none", 2400);
    }
  </script>
</body>
</html>
