<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>宇宙銀行ATM</title>

<style>

body{
background:#000;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:40px;
}

.atm{
width:320px;
margin:auto;
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 30px gold;
}

.screen{
background:#000;
padding:20px;
border-radius:10px;
margin-bottom:20px;
font-size:22px;
}

button{
padding:15px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
}

.rewardStage{
margin-top:30px;
}

.reward{
width:220px;
animation:pop 0.7s;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

.moneyRain{
position:fixed;
top:-50px;
font-size:30px;
animation:fall 3s linear;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(800px)}
}

</style>
</head>


<body>

<div class="atm">

<div class="screen" id="screen">
暗証番号を入力
</div>

<div>
<input type="password" id="pin" maxlength="4" style="font-size:22px;text-align:center;">
</div>

<button onclick="login()">OK</button>

<button onclick="receive()">受け取ります</button>

<div class="rewardStage" id="rewardStage">

<img id="rewardImage" class="reward">

<div id="rewardText"></div>

</div>

</div>

<script>

function login(){

let pin=document.getElementById("pin").value;

if(pin==="7777"){

document.getElementById("screen").innerText="宇宙銀行へようこそ";

}else{

document.getElementById("screen").innerText="暗証番号が違います";

}

}



function receive(){

let rewards=[

{img:"💴",text:"一億円！"},
{img:"💴💴",text:"五億円！"},
{img:"💰",text:"札束ザクザク！"},
{img:"🪙",text:"宇宙コイン！"},
{img:"🐶",text:"チャッピーの祝福！"},
{img:"🎀",text:"サリーの祝福！"},
{img:"🚂",text:"黄金列車到着！"},
{img:"✨",text:"宇宙ボーナス！"}

];

let r=Math.floor(Math.random()*rewards.length);

document.getElementById("rewardImage").style.display="none";

document.getElementById("rewardText").innerText=
rewards[r].img+" "+rewards[r].text;

moneyRain();

}



function moneyRain(){

for(let i=0;i<20;i++){

let m=document.createElement("div");

m.className="moneyRain";

m.innerText="💴";

m.style.left=Math.random()*100+"%";

document.body.appendChild(m);

setTimeout(()=>{
m.remove();
},3000);

}

}

</script>

</body>
</html>
